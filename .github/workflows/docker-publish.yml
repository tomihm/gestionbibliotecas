name: Construir y subir Docker Images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/gestionbibliotecas

jobs:
  build-and-push:
    name: Construir y subir Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir y subir Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./auditoria
          file: ./auditoria/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auditoria:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auditoria:${{ github.sha }}

      - name: Construir y subir Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./reservas
          file: ./reservas/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-reservas:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-reservas:${{ github.sha }}

      - name: Construir y subir Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./proveedores
          file: ./proveedores/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-proveedores:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-proveedores:${{ github.sha }}

      - name: Construir y subir Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./notificaciones
          file: ./notificaciones/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notificaciones:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notificaciones:${{ github.sha }}

      - name: Construir y subir Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./apigateway
          file: ./apigateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-apigateway:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-apigateway:${{ github.sha }}

      - name: Construir y subir Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ./eurekaserver
          file: ./eurekaserver/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-eurekaserver:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-eurekaserver:${{ github.sha }}
