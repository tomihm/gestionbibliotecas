services:

  mysql:
    image: mysql:8.4
    container_name: inventario-mysql
    restart: always
    environment:
      MYSQL_DATABASE: dev_inventario
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3316:3306"
    volumes:
      - ../docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - inventario-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  eurekaserver:
    build:
      context: ../eurekaserver
    image: eurekaserver:1.0
    container_name: inventario-eurekaserver
    ports:
      - "8761:8761"
    networks:
      - inventario-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  inventario:
    build:
      context: .
    image: inventario:1.0
    container_name: inventario-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_inventario
    depends_on:
      mysql:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks:
      - inventario-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

networks:
  inventario-network:
    driver: bridge
