spring:
  application:
    name: prod.inventario

  datasource:
    url: jdbc:mysql://localhost:3306/prod_inventariocreateDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8090}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dev.diemigo.inventario: INFO
    org.hibernate.SQL: WARN
