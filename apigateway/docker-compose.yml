services:

  mysql:
    image: mysql:8.4
    container_name: gateway-mysql
    restart: always
    environment:
      MYSQL_DATABASE: dev_auditoria
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - ../docker/mysql/init:/docker-entrypoint-initdb.d

  eurekaserver:
    build:
      context: ../eurekaserver
    image: eurekaserver:1.0
    container_name: gateway-eurekaserver
    ports:
      - "8761:8761"

  auditoria:
    build:
      context: ../auditoria
    image: auditoria:1.0
    container_name: gateway-auditoria
    depends_on:
      - mysql
      - eurekaserver
    ports:
      - "8080:8080"

  reservas:
    build:
      context: ../reservas
    image: reservas:1.0
    container_name: gateway-reservas
    depends_on:
      - mysql
      - eurekaserver
    ports:
      - "8082:8082"

  apigateway:
    build:
      context: .
    image: apigateway:1.0
    container_name: gateway-service
    depends_on:
      - auditoria
      - reservas
      - eurekaserver
    ports:
      - "8081:8081"
