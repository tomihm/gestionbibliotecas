server:
  port: 0

spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: false
    gateway:
      server:
        webmvc:
          routes:
            - id: auditoria-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/auditoria/**
            - id: reservas-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/reservas/**

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
