services:
  mysql:
    image: mysql:8.4
    container_name: notificaciones-mysql
    restart: always
    environment:
      MYSQL_DATABASE: dev_notificaciones
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3310:3306"
    networks:
      - notificaciones-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  eurekaserver:
    build:
      context: ../eurekaserver
    image: eurekaserver:1.0
    container_name: notificaciones-eurekaserver
    ports:
      - "8761:8761"
    networks:
      - notificaciones-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  notificaciones:
    build:
      context: .
    image: notificaciones:1.0
    container_name: notificaciones-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_notificaciones
    depends_on:
      mysql:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    ports:
      - "8084:8084"
    networks:
      - notificaciones-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

networks:
  notificaciones-network:
    driver: bridge
