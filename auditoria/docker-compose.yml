services:

  mysql:
    image: mysql:8.4
    container_name: auditoria-mysql
    restart: always
    environment:
      MYSQL_DATABASE: dev_auditoria
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - ../docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - auditoria-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  eurekaserver:
    build:
      context: ../eurekaserver
    image: eurekaserver:1.0
    container_name: auditoria-eurekaserver
    ports:
      - "8761:8761"
    networks:
      - auditoria-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  auditoria:
    build:
      context: .
    image: auditoria:1.0
    container_name: auditoria-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_auditoria
    depends_on:
      mysql:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - auditoria-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

networks:
  auditoria-network:
    driver: bridge
