spring:
  application:
    name: prod.auditoria

  datasource:
    url: jdbc:mysql://localhost:3306/prod_auditoria
    username: prod
    password: prod123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dev.diemigo.auditoria: INFO
    org.hibernate.SQL: WARN